name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-print-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: |
        mkdir build && cd build
        cmake .. -DBUILD_TESTS=ON
    - name: Build
      run: |
        cd build
        cmake --build .
    - name: Run tests
      run: |
        cd build
        ctest --verbose

  test-banking-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [gcc, clang]
    steps:
    - uses: actions/checkout@v4
    - name: Configure
      run: |
        mkdir build && cd build
        cmake .. -DBUILD_BANKING_TESTS=ON
    - name: Build
      run: |
        cd build
        cmake --build .
    - name: Run tests
      run: |
        cd build
        ctest --verbose

  test-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Configure print tests
      run: |
        mkdir build-print
        cd build-print
        cmake .. -DBUILD_TESTS=ON -Dgtest_force_shared_crt=ON
    - name: Build print tests
      run: |
        cd build-print
        cmake --build . --config Release
    - name: Run print tests
      run: |
        cd build-print
        ctest --verbose -C Release
    
    - name: Configure banking tests
      run: |
        mkdir build-banking
        cd build-banking
        cmake .. -DBUILD_BANKING_TESTS=ON -Dgtest_force_shared_crt=ON
    - name: Build banking tests
      run: |
        cd build-banking
        cmake --build . --config Release
    - name: Run banking tests
      run: |
        cd build-banking
        ctest --verbose -C Release
