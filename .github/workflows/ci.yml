name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        compiler: [gcc, clang]
        build_type: [Release, Debug]
    
    steps:
    - uses: actions/checkout@v3
    - name: Install CMake
      run: sudo apt-get install -y cmake
    - name: Configure
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }}
    - name: Run hello_world
      run: |
        if [ -f build/hello_world_application/hello_world ]; then
          ./build/hello_world_application/hello_world
        else
          find build -name "hello_world" -executable -exec {} \;
        fi
    - name: Run equation
      run: |
        echo "1 -3 2" | ./build/solver_application/equation || \
        echo "1 -3 2" | find build -name "equation" -executable -exec {} \;

  build-windows:
    runs-on: windows-latest
    
    strategy:
      matrix:
        build_type: [Release, Debug]
    
    steps:
    - uses: actions/checkout@v3
    - name: Configure
      run: |
        mkdir build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
    - name: Build
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }}
    - name: Run hello_world
      shell: pwsh
      run: |
        if (Test-Path "build/hello_world_application/hello_world.exe") {
          .\build\hello_world_application\hello_world.exe
        } else {
          Get-ChildItem -Recurse -Filter "hello_world.exe" | ForEach-Object { & $_ }
        }
    - name: Run equation
      shell: pwsh
      run: |
        echo "1 -3 2" | .\build\solver_application\equation.exe 2>$null
        if ($LASTEXITCODE -ne 0) {
          Get-ChildItem -Recurse -Filter "equation.exe" | ForEach-Object { echo "1 -3 2" | & $_ }
        }
